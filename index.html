<style>
:root{--red:#E10600;--dark:#1a1a1a;--bg:#f5f5f5;--border:#e0e0e0;--text:#1a1a1a;--muted:#666;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;--green:#00a651;--blue:#1565c0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--dark);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.5px;}
.header h1 span{color:var(--red);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#666;display:inline-block;margin-left:6px;}
.sync-dot.ok{background:#00a651;}
.sync-dot.err{background:#E10600;}
.sync-dot.loading{background:#FFD700;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;}
.nav{display:flex;background:white;border-bottom:1px solid var(--border);overflow-x:auto;}
.nav-btn{flex:1;min-width:68px;padding:11px 4px;border:none;background:none;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red);}
.screen{display:none;padding:16px;max-width:600px;margin:0 auto;}
.screen.active{display:block;}
.card{background:white;border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;}
.race-banner{background:var(--dark);color:white;border-radius:12px;padding:18px;margin-bottom:14px;}
.race-banner .gp-name{font-size:20px;font-weight:700;margin-bottom:3px;}
.race-banner .gp-sub{font-size:13px;color:rgba(255,255,255,.65);}
.race-status{display:inline-block;margin-top:9px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;}
.status-open{background:var(--green);color:white;}
.status-closed{background:var(--red);color:white;}
/* PILOT GRID - pronóstico */
.pilots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pilot-card{border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .13s;position:relative;background:white;}
.pilot-card:hover{border-color:#aaa;transform:translateY(-1px);}
.pilot-card.sel-1{border-color:var(--gold);background:#fffbee;}
.pilot-card.sel-2{border-color:var(--silver);background:#f8f8f8;}
.pilot-card.sel-3{border-color:var(--bronze);background:#fff8f3;}
.pilot-img{width:56px;height:56px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#ccc;flex-shrink:0;}
.pilot-img img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.pilot-name{font-size:11px;font-weight:600;line-height:1.2;}
.pilot-team{font-size:10px;color:var(--muted);margin-top:2px;}
.pos-badge{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#333;}
.pos-badge.b1{background:var(--gold);}
.pos-badge.b2{background:var(--silver);}
.pos-badge.b3{background:var(--bronze);}
/* PILOT GRID - pilotos tab */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.team-pilot{display:flex;align-items:center;gap:10px;padding:10px;background:#f8f8f8;border-radius:10px;}
.team-pilot-img{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.team-pilot-img img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.sel-summary{display:flex;gap:7px;margin-bottom:14px;}
.sel-slot{flex:1;border-radius:8px;padding:9px 6px;text-align:center;border:2px dashed var(--border);background:white;}
.sel-slot.f1{border-style:solid;border-color:var(--gold);background:#fffbee;}
.sel-slot.f2{border-style:solid;border-color:var(--silver);background:#f8f8f8;}
.sel-slot.f3{border-style:solid;border-color:var(--bronze);background:#fff8f3;}
.sel-slot .pos-lbl{font-size:10px;font-weight:700;color:var(--muted);}
.sel-slot .sel-nm{font-size:12px;font-weight:600;margin-top:2px;}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .13s;}
.btn-primary{background:var(--red);color:white;}
.btn-primary:hover{background:#c50500;}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}
.btn-secondary{background:white;color:var(--text);border:1px solid var(--border);margin-top:7px;}
.btn-blue{background:var(--blue);color:white;margin-top:7px;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;}
.login-logo{font-size:44px;margin-bottom:6px;}
.login-title{font-size:24px;font-weight:700;margin-bottom:3px;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;text-align:center;}
.login-card{background:white;border-radius:14px;border:1px solid var(--border);padding:22px;width:100%;max-width:320px;}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
.inp{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:12px;}
.inp:focus{border-color:var(--red);}
.avatar-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.av-opt{width:38px;height:38px;border-radius:50%;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;background:#f0f0f0;}
.av-opt:hover,.av-opt.selected{border-color:var(--red);background:#ffe;}
.rank-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-pos{font-size:17px;font-weight:700;min-width:26px;color:var(--muted);}
.rank-pos.rp1{color:var(--gold);}
.rank-pos.rp2{color:var(--silver);}
.rank-pos.rp3{color:var(--bronze);}
.rank-av{width:36px;height:36px;border-radius:50%;font-size:19px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;}
.result-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.result-item:last-child{border-bottom:none;}
.rpos{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.rpos.r1{background:var(--gold);color:#333;}
.rpos.r2{background:var(--silver);color:#333;}
.rpos.r3{background:var(--bronze);color:white;}
.chip{font-size:10px;padding:3px 7px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;gap:3px;}
.chip.ok{background:#e8f5e9;color:#2e7d32;}
.dot{width:7px;height:7px;border-radius:50%;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;color:white;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;transition:transform .3s;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.empty .ico{font-size:36px;margin-bottom:8px;}
.hist-race{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.hist-hdr{padding:11px 15px;background:var(--dark);color:white;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.hist-body{padding:12px 15px;display:none;}
.hist-body.open{display:block;}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.tag-ok{background:#e8f5e9;color:#2e7d32;}
.tag-pend{background:#fff3e0;color:#e65100;}
.mini-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:white;font-size:11px;font-weight:600;cursor:pointer;color:var(--text);}
.mini-btn.danger{color:var(--red);border-color:#ffcdd2;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:white;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px;}
.modal h2{font-size:17px;font-weight:700;margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;margin-top:14px;}
.modal-footer .btn{flex:1;padding:11px;}
.admin-warn{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:10px 12px;font-size:12px;color:#e65100;margin-bottom:12px;}
.firebase-setup{background:#e8f0fe;border:1px solid #b3c3f5;border-radius:10px;padding:14px;margin-bottom:14px;}
.firebase-setup h3{font-size:14px;font-weight:700;color:#1565c0;margin-bottom:8px;}
.firebase-setup p{font-size:12px;color:#333;line-height:1.5;margin-bottom:8px;}
.loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;color:white;}
.loading-screen .spin{font-size:48px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- FIREBASE SDK -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,onValue,get}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Firebase config (se lee de localStorage para que el admin la configure una vez) ──
function getFirebaseCfg(){
  try{return JSON.parse(localStorage.getItem('f1_firebase_cfg')||'null');}catch(e){return null;}
}

let db=null,unsubscribe=null;

function initFirebase(cfg){
  try{
    const app=initializeApp(cfg,'f1app');
    db=getDatabase(app);
    return true;
  }catch(e){
    console.error('Firebase init error',e);
    return false;
  }
}

// ── State ──
let currentUser=null,isAdmin=false;
let state={race:null,results:null,predictions:{},users:{},pastRaces:[],adminPass:'f1admin2025'};

// ── Sync helpers ──
function setSyncStatus(status){
  const dots=['sync-dot','sync-dot-admin'];
  dots.forEach(id=>{const el=document.getElementById(id);if(el){el.className='sync-dot '+(status||'');}});
}

async function saveState(){
  // Always save to localStorage as backup
  try{localStorage.setItem('f1_state_v3',JSON.stringify(state));}catch(e){}
  if(!db){setSyncStatus('err');return;}
  setSyncStatus('loading');
  try{
    await set(ref(db,'f1state'),state);
    setSyncStatus('ok');
  }catch(e){
    console.error('Firebase save error',e);
    setSyncStatus('err');
    toast('⚠️ Sin conexión — datos guardados localmente');
  }
}

function subscribeToState(){
  if(!db) return;
  const stateRef=ref(db,'f1state');
  onValue(stateRef,snapshot=>{
    const data=snapshot.val();
    if(data){
      state={...state,...data};
      // Patch arrays that might come as objects from Firebase
      if(state.pastRaces&&!Array.isArray(state.pastRaces)) state.pastRaces=Object.values(state.pastRaces);
      localStorage.setItem('f1_state_v3',JSON.stringify(state));
      setSyncStatus('ok');
      refreshCurrentView();
    }
  },err=>{
    console.error('Firebase listen error',err);
    setSyncStatus('err');
  });
}

function refreshCurrentView(){
  if(!currentUser) return;
  if(isAdmin){
    renderAdminCarrera();renderAdminHistorial();renderAdminUsuarios();
  } else {
    const active=document.querySelector('#main-app .screen.active');
    if(!active) return;
    const id=active.id.replace('screen-','');
    if(id==='pronostico') renderPronostico();
    else if(id==='pilotos') renderPilotos();
    else if(id==='predicciones') renderPredicciones();
    else if(id==='ranking') renderRanking();
    else if(id==='historial') renderHistorialUser();
  }
}

// ── Init ──
async function init(){
  const cfg=getFirebaseCfg();
  // Load local backup while connecting
  try{const local=localStorage.getItem('f1_state_v3');if(local) state={...state,...JSON.parse(local)};}catch(e){}

  if(cfg&&cfg.databaseURL){
    const ok=initFirebase(cfg);
    if(ok){
      // Try to get latest from Firebase first
      try{
        const snap=await get(ref(db,'f1state'));
        if(snap.val()) state={...state,...snap.val()};
        if(state.pastRaces&&!Array.isArray(state.pastRaces)) state.pastRaces=Object.values(state.pastRaces);
      }catch(e){setSyncStatus('err');}
      subscribeToState();
      setSyncStatus('ok');
    } else {setSyncStatus('err');}
  } else {
    setSyncStatus('err');
  }

  document.getElementById('loading-screen').style.display='none';
  const su=localStorage.getItem('f1_user');
  if(su){
    const u=JSON.parse(su);currentUser=u;isAdmin=u.isAdmin||false;
    isAdmin?showAdminApp():showMainApp();
  } else showLogin();
}

// ── Auth ──
function $id(id){return document.getElementById(id);}
function showEl(id,d='block'){$id(id).style.display=d;}
function hideEl(id){$id(id).style.display='none';}

function showLogin(){showEl('login-screen','flex');hideEl('admin-login-screen');hideEl('main-app');hideEl('admin-app');}
function showAdminLogin(){hideEl('login-screen');showEl('admin-login-screen','flex');}

function doLogin(){
  const name=$id('login-name').value.trim();
  if(!name) return toast('Ingresa tu nombre');
  const av=document.querySelector('.av-opt.selected')?.dataset.av||'🏎️';
  const uids=Object.keys(state.users||{});
  const existing=uids.find(id=>state.users[id].name.toLowerCase()===name.toLowerCase());
  let uid;
  if(existing){uid=existing;state.users[uid].avatar=av;}
  else{
    if(uids.length>=10) return toast('Máximo 10 usuarios');
    uid='u_'+Date.now();
    state.users[uid]={name,avatar:av,points:0,history:[]};
  }
  currentUser={id:uid,name,avatar:av};
  localStorage.setItem('f1_user',JSON.stringify(currentUser));
  saveState();showMainApp();
}

function doAdminLogin(){
  if($id('admin-pass').value!==state.adminPass) return toast('Contraseña incorrecta');
  currentUser={id:'admin',name:'Admin',isAdmin:true};isAdmin=true;
  localStorage.setItem('f1_user',JSON.stringify(currentUser));
  showAdminApp();
}

function logout(){localStorage.removeItem('f1_user');currentUser=null;isAdmin=false;showLogin();}

function showMainApp(){
  hideEl('login-screen');hideEl('admin-login-screen');showEl('main-app');hideEl('admin-app');
  $id('header-user').textContent=(currentUser.avatar||'👤')+' '+currentUser.name+' · Salir';
  renderPronostico();renderRanking();renderHistorialUser();
}

function showScreen(name,btn){
  document.querySelectorAll('#main-app .screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('#main-app .nav-btn').forEach(b=>b.classList.remove('active'));
  $id('screen-'+name).classList.add('active');btn.classList.add('active');
  if(name==='pilotos') renderPilotos();
  if(name==='predicciones') renderPredicciones();
  if(name==='ranking') renderRanking();
  if(name==='historial') renderHistorialUser();
}

// ── Pronóstico ──
let mySel={p1:null,p2:null,p3:null};
function isOpen(){return state.race?.date&&new Date()<new Date(state.race.date);}
function pName(id){const p=(state.race?.pilots||[]).find(x=>x.id===id);return p?p.name.split(' ')[0]:'?';}

function pilotImgHTML(p,size=56){
  if(p.img) return `<img src="${p.img}" alt="${p.name}" style="width:${size}px;height:${size}px;object-fit:cover;object-position:top center;border-radius:50%;" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><span style="display:none;width:${size}px;height:${size}px;border-radius:50%;background:${p.color||'#888'};align-items:center;justify-content:center;font-size:${Math.round(size*.35)}px;font-weight:700;color:white;">${p.name[0]}</span>`;
  return `<span style="width:${size}px;height:${size}px;border-radius:50%;background:${p.color||'#888'};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.35)}px;font-weight:700;color:white;">${p.name[0]}</span>`;
}

function pilotCardHTML(p){
  const cls=mySel.p1===p.id?'sel-1':mySel.p2===p.id?'sel-2':mySel.p3===p.id?'sel-3':'';
  const bn_=cls==='sel-1'?'1':cls==='sel-2'?'2':cls==='sel-3'?'3':'';
  const bnc=cls==='sel-1'?'b1':cls==='sel-2'?'b2':cls==='sel-3'?'b3':'';
  return `<div class="pilot-card ${cls}" onclick="selPilot('${p.id}')">
    ${cls?`<div class="pos-badge ${bnc}">${bn_}</div>`:''}
    <div class="pilot-img" style="background:${p.color||'#888'};width:56px;height:56px;">${pilotImgHTML(p,56)}</div>
    <div class="pilot-name">${p.name}</div>
    <div class="pilot-team" style="color:${p.color||'var(--muted)'};">${p.team}</div>
  </div>`;
}

function podiumHTML(pred,pilots){
  const gn=id=>{const p=(pilots||[]).find(x=>x.id===id);return p?p.name:'?';};
  return `<div class="result-item"><div class="rpos r1">1</div><span style="font-size:13px;font-weight:600;">${gn(pred.p1)}</span></div>
  <div class="result-item"><div class="rpos r2">2</div><span style="font-size:13px;font-weight:600;">${gn(pred.p2)}</span></div>
  <div class="result-item"><div class="rpos r3">3</div><span style="font-size:13px;font-weight:600;">${gn(pred.p3)}</span></div>`;
}

function renderPronostico(){
  const el=$id('screen-pronostico');
  if(!state.race){el.innerHTML=`<div class="race-banner"><div class="gp-name">Sin carrera activa</div><div class="gp-sub">El admin aún no configuró una carrera</div></div>`;return;}
  const open=isOpen();
  const d=new Date(state.race.date);
  const ds=d.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  const ts=d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  let html=`<div class="race-banner"><div class="gp-name">${state.race.name}</div><div class="gp-sub">${state.race.circuit||''}</div><div class="gp-sub" style="margin-top:3px;">🗓 ${ds} · ${ts}</div><span class="race-status ${open?'status-open':'status-closed'}">${open?'🟢 Pronósticos abiertos':'🔴 Cerrado'}</span></div>`;
  const myPred=state.predictions[currentUser.id];
  if(myPred) mySel={p1:myPred.p1,p2:myPred.p2,p3:myPred.p3};
  if(!open){
    if(myPred) html+=`<div class="card"><div class="card-title">Tu pronóstico</div>${podiumHTML(myPred,state.race.pilots)}</div>`;
    else html+=`<div class="card"><div class="empty"><div class="ico">😞</div><p>No ingresaste pronóstico para esta carrera</p></div></div>`;
    if(state.results) html+=`<div class="card"><div class="card-title">Resultado oficial</div>${podiumHTML(state.results,state.race.pilots)}</div>`;
    else html+=`<div class="card"><div class="empty"><div class="ico">⏳</div><p>Esperando resultado oficial…</p></div></div>`;
    el.innerHTML=html;return;
  }
  const pilots=state.race.pilots||[];
  if(!pilots.length){el.innerHTML=html+`<div class="empty"><div class="ico">👷</div><p>El admin aún no cargó los pilotos</p></div>`;return;}
  html+=`<p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Toca un piloto para elegir 1°, 2° y 3° lugar:</p>
  <div class="sel-summary">
    <div class="sel-slot ${mySel.p1?'f1':''}" id="sl1"><div class="pos-lbl">🥇 1°</div><div class="sel-nm" id="sn1">${mySel.p1?pName(mySel.p1):'—'}</div></div>
    <div class="sel-slot ${mySel.p2?'f2':''}" id="sl2"><div class="pos-lbl">🥈 2°</div><div class="sel-nm" id="sn2">${mySel.p2?pName(mySel.p2):'—'}</div></div>
    <div class="sel-slot ${mySel.p3?'f3':''}" id="sl3"><div class="pos-lbl">🥉 3°</div><div class="sel-nm" id="sn3">${mySel.p3?pName(mySel.p3):'—'}</div></div>
  </div>
  <div class="pilots-grid" id="pgrid">${pilots.map(p=>pilotCardHTML(p)).join('')}</div>
  <button class="btn btn-primary" style="margin-top:14px;" id="spbtn" onclick="savePred()" ${(!mySel.p1||!mySel.p2||!mySel.p3)?'disabled':''}>
    ${myPred?'Actualizar pronóstico':'Guardar pronóstico'}
  </button>`;
  el.innerHTML=html;
}

function selPilot(id){
  if(!isOpen()) return;
  if(mySel.p1===id) mySel.p1=null;
  else if(mySel.p2===id) mySel.p2=null;
  else if(mySel.p3===id) mySel.p3=null;
  else if(!mySel.p1) mySel.p1=id;
  else if(!mySel.p2) mySel.p2=id;
  else if(!mySel.p3) mySel.p3=id;
  else return toast('Ya elegiste 3. Toca uno para quitar.');
  $id('pgrid').innerHTML=(state.race.pilots||[]).map(p=>pilotCardHTML(p)).join('');
  [['sl1','sn1','p1','f1'],['sl2','sn2','p2','f2'],['sl3','sn3','p3','f3']].forEach(([si,ni,pos,fc])=>{
    $id(si).className='sel-slot '+(mySel[pos]?fc:'');
    $id(ni).textContent=mySel[pos]?pName(mySel[pos]):'—';
  });
  const btn=$id('spbtn');if(btn) btn.disabled=!(mySel.p1&&mySel.p2&&mySel.p3);
}

async function savePred(){
  if(!mySel.p1||!mySel.p2||!mySel.p3) return toast('Elige 3 pilotos');
  if(!isOpen()) return toast('Pronósticos cerrados');
  state.predictions[currentUser.id]={...mySel,ts:new Date().toISOString()};
  await saveState();toast('✅ Pronóstico guardado');
  const btn=$id('spbtn');if(btn) btn.textContent='Actualizar pronóstico';
}

// ── Historial usuario ──
function calcPts(pred,results){let p=0;if(pred.p1===results.p1)p+=5;if(pred.p2===results.p2)p+=3;if(pred.p3===results.p3)p+=1;return p;}
function togHist(el){const b=el.nextElementSibling;b.classList.toggle('open');const ar=el.querySelector('div:last-child div:last-child');if(ar) ar.textContent=b.classList.contains('open')?'▲':'▼';}

function renderHistorialUser(){
  const el=$id('screen-historial');
  const past=state.pastRaces||[];
  if(!past.length){el.innerHTML='<div class="empty"><div class="ico">📋</div><p>Aún no hay carreras completadas</p></div>';return;}
  el.innerHTML=past.slice().reverse().map(race=>{
    const myPred=race.predictions?race.predictions[currentUser.id]:null;
    const myPts=myPred&&race.results?calcPts(myPred,race.results):0;
    return `<div class="hist-race">
      <div class="hist-hdr" onclick="togHist(this)">
        <div><div style="font-size:14px;font-weight:600;">${race.name}</div><div style="font-size:11px;color:rgba(255,255,255,.55);">${race.circuit||''}</div></div>
        <div style="text-align:right;">${myPts>0?`<div style="color:#4caf50;font-weight:700;font-size:13px;">+${myPts} pts</div>`:myPred?'<div style="color:#ff7043;font-size:13px;">0 pts</div>':'<div style="font-size:11px;color:#888;">sin pronóstico</div>'}
        <div style="font-size:11px;color:rgba(255,255,255,.4);">▼</div></div>
      </div>
      <div class="hist-body">
        ${race.results?`<div style="font-size:12px;font-weight:600;margin-bottom:6px;">Resultado oficial:</div>${podiumHTML(race.results,race.pilots||[])}`:'<p style="color:var(--muted);font-size:13px;">Sin resultado registrado</p>'}
        ${myPred?`<div style="font-size:12px;font-weight:600;margin:10px 0 6px;">Tu pronóstico:</div>${podiumHTML(myPred,race.pilots||[])}`:'<p style="color:var(--muted);font-size:13px;margin-top:8px;">No ingresaste pronóstico</p>'}
      </div>
    </div>`;
  }).join('');
}

// ── Recalc ──
function recalcAllPoints(){
  Object.keys(state.users||{}).forEach(uid=>{state.users[uid].points=0;state.users[uid].history=[];});
  (state.pastRaces||[]).forEach(race=>{
    if(!race.results) return;
    Object.entries(race.predictions||{}).forEach(([uid,pred])=>{
      if(!state.users[uid]) return;
      const pts=calcPts(pred,race.results);
      state.users[uid].points=(state.users[uid].points||0)+pts;
      state.users[uid].history.push({race:race.name,pts});
    });
  });
  if(state.race&&state.results){
    Object.entries(state.predictions||{}).forEach(([uid,pred])=>{
      if(!state.users[uid]) return;
      const pts=calcPts(pred,state.results);
      state.users[uid].points=(state.users[uid].points||0)+pts;
      state.users[uid].history.push({race:state.race.name,pts});
    });
  }
}

function buildCsvUrl(rawUrl){
  // Accepts two formats:
  // 1. "Publish to web" URL: .../spreadsheets/d/e/2PACX-.../pub?...  → use as-is adding output=csv
  // 2. Normal share URL:      .../spreadsheets/d/SHEET_ID/...         → convert to pub URL via gviz
  const pubMatch=rawUrl.match(/\/spreadsheets\/d\/e\/([^/?#]+)/);
  if(pubMatch) return `https://docs.google.com/spreadsheets/d/e/${pubMatch[1]}/pub?output=csv&gid=0`;
  const idMatch=rawUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(idMatch) return `https://docs.google.com/spreadsheets/d/${idMatch[1]}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
  return null;
}

function parseCsvLine(line){
  // Handles quoted fields that may contain commas
  const cols=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=c;
  }
  cols.push(cur.trim());
  return cols;
}

async function importFromSheets(){
  const rawUrl=($id('sheets-url').value||'').trim();
  if(!rawUrl) return toast('Pega la URL del Sheet');
  const csvUrl=buildCsvUrl(rawUrl);
  if(!csvUrl) return toast('URL no reconocida. Copia la URL desde Archivo → Publicar en la web.');
  toast('Importando…');
  try{
    const res=await fetch(csvUrl);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2) return toast('La hoja está vacía o tiene solo encabezado');
    state.race.pilots=state.race.pilots||[];
    let added=0;
    for(let i=1;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      const [name,team,color,img]=cols;
      if(!name||!team) continue;
      if(state.race.pilots.find(p=>p.name.toLowerCase()===name.toLowerCase())) continue;
      state.race.pilots.push({id:'p_'+Date.now()+'_'+i,name,team,color:color||'#e10600',img:img||''});
      added++;
    }
    if(added===0) return toast('No se agregaron pilotos. Verifica que el encabezado sea: Nombre, Equipo, Color, Foto');
    await saveState();
    $id('admin-pilot-list').innerHTML=pilotListHTML(state.race.pilots,false);
    $id('admin-results-card').innerHTML=`<div class="card-title">Resultado oficial</div>${adminResultsForm()}`;
    $id('sheets-url').value='';
    toast(`✅ ${added} piloto${added!==1?'s':''} importado${added!==1?'s':''}`);
  }catch(e){
    console.error(e);
    toast('❌ Error de acceso. Sigue los pasos: Archivo → Publicar en la web → CSV → Copiar enlace');
  }
}

    <h3>🔥 Configuración Firebase ${hasCfg?'<span style="color:#00a651;font-size:12px;">✓ Conectado</span>':'<span style="color:#E10600;font-size:12px;">✗ Sin configurar</span>'}</h3>
    <p>Firebase permite que todos los dispositivos vean los mismos datos en tiempo real. Sigue la guía de configuración para obtener los valores necesarios.</p>
    <label class="lbl">API Key</label>
    <input class="inp" id="fb-apikey" value="${cfg?.apiKey||''}" placeholder="AIzaSy…">
    <label class="lbl">Auth Domain</label>
    <input class="inp" id="fb-authdomain" value="${cfg?.authDomain||''}" placeholder="mi-proyecto.firebaseapp.com">
    <label class="lbl">Database URL</label>
    <input class="inp" id="fb-dburl" value="${cfg?.databaseURL||''}" placeholder="https://mi-proyecto-default-rtdb.firebaseio.com">
    <label class="lbl">Project ID</label>
    <input class="inp" id="fb-projectid" value="${cfg?.projectId||''}" placeholder="mi-proyecto">
    <label class="lbl">App ID</label>
    <input class="inp" id="fb-appid" value="${cfg?.appId||''}" placeholder="1:123456:web:abc123">
    <button class="btn btn-primary" onclick="saveFirebaseCfg()">Guardar configuración Firebase</button>
  </div>
  <div class="card">
    <div class="card-title">Contraseña admin</div>
    <input class="inp" type="password" id="new-pass" placeholder="Nueva contraseña (mín. 4 caracteres)">
    <button class="btn btn-primary" onclick="changePass()">Cambiar contraseña</button>
  </div>
  <div class="card">
    <div class="card-title">Recalcular puntos</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">Recalcula todos los puntos desde cero.</p>
    <button class="btn btn-blue" onclick="forceRecalc()">Recalcular todo</button>
  </div>`;
}

function saveFirebaseCfg(){
  const cfg={
    apiKey:$id('fb-apikey').value.trim(),
    authDomain:$id('fb-authdomain').value.trim(),
    databaseURL:$id('fb-dburl').value.trim(),
    projectId:$id('fb-projectid').value.trim(),
    appId:$id('fb-appid').value.trim()
  };
  if(!cfg.apiKey||!cfg.databaseURL) return toast('API Key y Database URL son obligatorios');
  localStorage.setItem('f1_firebase_cfg',JSON.stringify(cfg));
  toast('✅ Configuración guardada — recarga la página para conectar');
  renderAdminConfig();
}

async function changePass(){
  const p=$id('new-pass').value;if(!p||p.length<4) return toast('Contraseña muy corta');
  state.adminPass=p;await saveState();toast('✅ Contraseña actualizada');
}

async function forceRecalc(){recalcAllPoints();await saveState();renderAdminUsuarios();toast('✅ Puntos recalculados');}

// ── Avatar select ──
document.querySelectorAll('.av-opt').forEach(opt=>{
  opt.addEventListener('click',function(){
    document.querySelectorAll('.av-opt').forEach(o=>o.classList.remove('selected'));
    this.classList.add('selected');
  });
});

// ── Toast ──
function toast(msg){const t=$id('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ── Expose globals for inline onclick ──
Object.assign(window,{
  showLogin,showAdminLogin,doLogin,doAdminLogin,logout,showScreen,showAdminTab,
  selPilot,savePred,togHist,
  saveCurrentRace,archiveCurrentRace,addPilot,removePilot,importFromSheets,saveCurrentResults,
  renderAdminCarrera,renderAdminHistorial,renderAdminUsuarios,renderAdminConfig,
  openNewPastRaceModal,saveNewPastRace,openEditRaceInfoModal,savePastRaceInfo,
  openEditPilotsModal,addPastPilot,removePastPilot,importPastPilotsFromSheets,
  openEditResultsModal,savePastResults,openEditPredsModal,clearOnePred,savePastPreds,deletePastRace,
  removeUser,saveFirebaseCfg,changePass,forceRecalc,closeModal,closeModalOutside
});

// ── Start ──
init();
</script>
